<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Combinator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="nav-link">About <span class="dropdown-arrow">▾</span></a>
            <a href="#" class="nav-link">Companies <span class="dropdown-arrow">▾</span></a>
            <a href="#" class="nav-link">Library</a>
        </div>
        
        <div class="nav-center">
            <a href="#" class="logo">
                <svg class="logo-y" viewBox="0 0 40 40" width="32" height="32">
                    <polygon points="20,0 40,0 40,40 20,40" fill="#FF6B35"/>
                    <polygon points="0,0 20,0 20,40 0,40" fill="#FF6B35"/>
                    <polygon points="0,15 40,15 40,25 0,25" fill="#F8F7F4"/>
                </svg>
            </a>
        </div>
        
        <div class="nav-right">
            <a href="#" class="nav-link">Partners</a>
            <a href="#" class="nav-link">Resources <span class="dropdown-arrow">▾</span></a>
            <a href="#" class="nav-link">Startup Jobs</a>
            <a href="#" class="login-link">Log in</a>
            <a href="#" class="apply-btn">Apply</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-regular">YC turns builders into</span>
                <span class="title-italic">formidable founders</span><sup class="superscript">[1]</sup>
            </h1>
            
            <div class="quote-section">
                <p class="quote-text">
                    <sup class="quote-sup">[1]</sup> A formidable person is one who seems like they'll get what they want, regardless of whatever obstacles are in the way.
                </p>
                <p class="quote-attribution">— Paul Graham</p>
            </div>
        </div>
        
        <div class="scroll-indicator">
            <svg class="arrow-down" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#1A1A1A" stroke-width="1.5">
                <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
        </div>
    </main>
</body>
</html>
