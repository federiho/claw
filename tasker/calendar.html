<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Calendar View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            padding: clamp(12px, 2vw, 30px);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: clamp(24px, 2vw, 42px);
            margin-bottom: 10px;
            color: #ffffff;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .week-info {
            font-size: clamp(12px, 1vw, 18px);
            color: #a0a0a0;
        }

        .today-date {
            font-size: clamp(14px, 1.2vw, 24px);
            font-weight: 600;
            color: #4facfe;
            padding: clamp(6px, 0.8vw, 12px) clamp(12px, 1.5vw, 24px);
            background-color: rgba(79, 172, 254, 0.1);
            border-radius: 6px;
            border-left: 3px solid #4facfe;
        }

        .sync-status {
            font-size: 12px;
            color: #808080;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: clamp(8px, 1vw, 16px);
            margin-bottom: 20px;
            width: 100%;
        }

        .day-column {
            background-color: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: clamp(400px, 60vh, 800px);
            border: 1px solid #3d3d3d;
            transition: border-color 0.3s ease;
        }

        .day-column.today {
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.15);
        }

        .day-header {
            background-color: #252525;
            padding: clamp(12px, 1.5vw, 20px) clamp(10px, 1vw, 16px);
            border-bottom: 1px solid #3d3d3d;
            text-align: center;
        }

        .day-header.today {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2), rgba(79, 172, 254, 0.05));
            border-bottom-color: #4facfe;
        }

        .day-name {
            font-size: clamp(10px, 0.9vw, 14px);
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .day-date {
            font-size: clamp(20px, 2vw, 36px);
            font-weight: 700;
            color: #e0e0e0;
        }

        .day-date.today {
            color: #4facfe;
        }

        .tasks-container {
            flex: 1;
            padding: clamp(8px, 1vw, 16px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1vw, 12px);
        }

        .task-card {
            background-color: #383838;
            border-left: 4px solid #666;
            border-radius: 4px;
            padding: clamp(10px, 1vw, 16px);
            font-size: clamp(12px, 1vw, 16px);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-card:hover {
            background-color: #404040;
            transform: translateX(4px);
        }

        .task-card.priority-high {
            border-left-color: #ff5252;
        }

        .task-card.priority-medium {
            border-left-color: #ffa726;
        }

        .task-card.priority-low {
            border-left-color: #66bb6a;
        }

        .task-card.overdue {
            background-color: rgba(255, 82, 82, 0.1);
            border-color: #ff5252;
            border-left-color: #ff5252;
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.2);
        }

        .task-id {
            font-size: clamp(9px, 0.8vw, 13px);
            color: #808080;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-title {
            font-weight: 500;
            color: #e0e0e0;
            line-height: 1.3;
            word-break: break-word;
            font-size: clamp(12px, 1vw, 16px);
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(10px, 0.9vw, 13px);
        }

        .task-priority {
            display: inline-block;
            padding: clamp(2px, 0.3vw, 4px) clamp(6px, 0.8vw, 10px);
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: clamp(9px, 0.8vw, 12px);
        }

        .task-priority.high {
            background-color: rgba(255, 82, 82, 0.2);
            color: #ff5252;
        }

        .task-priority.medium {
            background-color: rgba(255, 167, 38, 0.2);
            color: #ffa726;
        }

        .task-priority.low {
            background-color: rgba(102, 187, 106, 0.2);
            color: #66bb6a;
        }

        .task-due {
            color: #a0a0a0;
            font-size: 10px;
        }

        .task-due.overdue {
            color: #ff5252;
            font-weight: 600;
        }

        .no-tasks {
            color: #606060;
            text-align: center;
            padding: 20px 10px;
            font-size: 12px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scrollbar styling */
        .tasks-container::-webkit-scrollbar {
            width: 6px;
        }

        .tasks-container::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .tasks-container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .tasks-container::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .calendar {
                gap: 8px;
            }

            .day-column {
                min-height: 500px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 24px;
            }

            .calendar {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }

            .day-column {
                min-height: 400px;
            }

            .day-header {
                padding: 12px 8px;
            }

            .day-date {
                font-size: 20px;
            }

            .day-name {
                font-size: 10px;
            }

            .tasks-container {
                padding: 8px;
                gap: 8px;
            }

            .task-card {
                padding: 10px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .calendar {
                grid-template-columns: repeat(2, 1fr);
            }

            .day-column {
                min-height: 350px;
            }

            .header-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .today-date {
                width: 100%;
            }
        }

        /* Large screens (ultrawide) */
        @media (min-width: 1920px) {
            body {
                padding: 30px;
            }
            
            .container {
                padding: 0 40px;
            }
            
            .header h1 {
                font-size: 42px;
            }
            
            .week-info {
                font-size: 18px;
            }
            
            .today-date {
                font-size: 24px;
                padding: 12px 24px;
            }
            
            .calendar {
                gap: 16px;
            }
            
            .day-column {
                min-height: 700px;
            }
            
            .day-header {
                padding: 20px;
            }
            
            .day-name {
                font-size: 14px;
            }
            
            .day-date {
                font-size: 32px;
            }
            
            .tasks-container {
                padding: 16px;
                gap: 12px;
            }
            
            .task-card {
                padding: 16px;
                font-size: 15px;
            }
            
            .task-id {
                font-size: 13px;
            }
            
            .task-title {
                font-size: 15px;
            }
            
            .task-priority {
                font-size: 11px;
            }
        }

        /* Extra large screens (4K) */
        @media (min-width: 2560px) {
            .header h1 {
                font-size: 48px;
            }
            
            .day-column {
                min-height: 800px;
            }
            
            .day-date {
                font-size: 36px;
            }
            
            .task-card {
                font-size: 16px;
            }
        }

        .error-message {
            background-color: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff5252;
            font-size: 13px;
        }

        /* Navigation & Actions */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            background: #3c4043;
            border: none;
            color: #e0e0e0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background: #5f6368; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .add-btn {
            background: #34a853;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .add-btn:hover { background: #2d8a47; }

        .save-btn {
            background: #fbbc05;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .save-btn:hover { background: #f9a825; }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4facfe;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #666;
            color: #a0a0a0;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: #333;
            color: #e0e0e0;
        }

        .btn-submit {
            background: #4facfe;
            border: none;
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit:hover { background: #3d9bfa; }

        .btn-delete {
            background: #ff5252;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-delete:hover { background: #e04848; }

        .btn-secondary {
            background: #666;
            border: none;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .json-export {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            color: #4facfe;
            font-family: monospace;
            font-size: 12px;
            margin-top: 15px;
            resize: none;
        }

        #changesPreview {
            margin-bottom: 15px;
        }

        #changesPreview ul {
            list-style: none;
            padding: 0;
        }

        #changesPreview li {
            padding: 8px 0;
            border-bottom: 1px solid #444;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Task Calendar</h1>
            <div class="header-info">
                <div class="week-nav">
                    <button class="nav-btn" onclick="changeWeek(-1)">←</button>
                    <div class="week-info">
                        Week of <span id="weekStart"></span> - <span id="weekEnd"></span>
                    </div>
                    <button class="nav-btn" onclick="changeWeek(1)">→</button>
                </div>
                <div class="header-actions">
                    <button id="saveChangesBtn" class="save-btn" onclick="showSaveModal()" style="display:none;">💾 Save Changes</button>
                    <button class="add-btn" onclick="showCreateModal()">+ New Task</button>
                    <div class="today-date">
                        Today: <span id="todayDisplay"></span>
                    </div>
                    <div class="sync-status">
                        <div class="sync-dot"></div>
                        <span>Live sync: <span id="syncTime">just now</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorContainer"></div>

        <div class="calendar" id="calendar"></div>
    </div>

    <!-- Create Task Modal -->
    <div id="createModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Create New Task</h2>
            <form id="createForm" onsubmit="handleCreateSubmit(event)">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="newTaskTitle" required placeholder="Task title">
                </div>
                <div class="form-group">
                    <label>Due Date (optional)</label>
                    <input type="date" id="newTaskDate">
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="newTaskPriority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="newTaskNotes" rows="3" placeholder="Additional notes..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Edit Task <span id="editTaskId"></span></h2>
            <form id="editForm" onsubmit="handleEditSubmit(event)">
                <input type="hidden" id="editTaskIdHidden">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editTaskTitle" required>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="editTaskDate">
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="editTaskPriority">
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="editTaskNotes" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="button" class="btn-delete" onclick="deleteCurrentTask()">Delete</button>
                    <button type="submit" class="btn-submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Save Changes Modal -->
    <div id="saveModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Save Changes</h2>
            <div id="changesPreview"></div>
            <textarea id="jsonExport" class="json-export" readonly></textarea>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeSaveModal()">Close</button>
                <button type="button" class="btn-submit" onclick="copyJSON()">📋 Copy JSON</button>
                <button type="button" class="btn-secondary" onclick="clearPendingChanges()">Clear All</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            tasksPath: 'https://federiho.github.io/claw/tasker/tasks.json',
            syncInterval: 30000, // 30 seconds
            firstDayOfWeek: 1 // 0 = Sunday, 1 = Monday
        };

        // State
        let tasks = [];
        let lastSyncTime = new Date();

        /**
         * Get ISO date string for a date
         */
        function getDateString(date) {
            return date.toISOString().split('T')[0];
        }

        /**
         * Format date for display
         */
        function formatDate(date) {
            return date.toLocaleDateString('it-IT', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        /**
         * Get the start of the week
         */
        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (CONFIG.firstDayOfWeek === 0 ? 0 : 1);
            return new Date(d.setDate(diff));
        }

        /**
         * Get array of 7 days starting from week start
         */
        function getWeekDays(startDate) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(startDate);
                d.setDate(d.getDate() + i);
                days.push(d);
            }
            return days;
        }

        function getCurrentWeekStart() {
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay() + 1 + (currentWeekOffset * 7));
            startOfWeek.setHours(0, 0, 0, 0);
            return startOfWeek;
        }

        /**
         * Check if a date is today
         */
        function isToday(date) {
            const today = new Date();
            return date.getFullYear() === today.getFullYear() &&
                   date.getMonth() === today.getMonth() &&
                   date.getDate() === today.getDate();
        }

        /**
         * Check if a date is in the past
         */
        function isPast(date) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return date < today;
        }

        /**
         * Load tasks from JSON file (fallback to sample data if not available)
         */
        // Pending changes storage
        let pendingChanges = JSON.parse(localStorage.getItem('pendingChanges') || '[]');
        let currentWeekOffset = 0;

        async function loadTasks() {
            try {
                // Add cache-busting parameter
                const cacheBuster = '?t=' + Date.now();
                const response = await fetch(CONFIG.tasksPath + cacheBuster);
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                tasks = applyPendingChanges(data.tasks || []);
            } catch (error) {
                console.error('Fetch error:', error);
                tasks = [];
                showError(`Could not load tasks.`);
            }
            renderCalendar();
            updatePendingChangesUI();
            updateLastSyncTime();
        }

        function applyPendingChanges(originalTasks) {
            let modifiedTasks = [...originalTasks];
            
            pendingChanges.forEach(change => {
                switch(change.type) {
                    case 'create':
                        modifiedTasks.push(change.data);
                        break;
                    case 'update':
                        const idx = modifiedTasks.findIndex(t => t.id === change.data.id);
                        if (idx !== -1) modifiedTasks[idx] = {...modifiedTasks[idx], ...change.data};
                        break;
                    case 'move':
                        const taskIdx = modifiedTasks.findIndex(t => t.id === change.data.id);
                        if (taskIdx !== -1) modifiedTasks[taskIdx].due = change.data.due;
                        break;
                    case 'delete':
                        modifiedTasks = modifiedTasks.filter(t => t.id !== change.data.id);
                        break;
                }
            });
            
            return modifiedTasks;
        }

        function addPendingChange(type, data) {
            // Remove any existing change for this task
            pendingChanges = pendingChanges.filter(c => !(c.data.id === data.id && c.type !== 'create'));
            pendingChanges.push({type, data, timestamp: new Date().toISOString()});
            localStorage.setItem('pendingChanges', JSON.stringify(pendingChanges));
            updatePendingChangesUI();
            renderCalendar();
        }

        function updatePendingChangesUI() {
            const count = pendingChanges.length;
            const btn = document.getElementById('saveChangesBtn');
            if (btn) {
                btn.textContent = count > 0 ? `💾 Save Changes (${count})` : '💾 Save Changes';
                btn.style.display = count > 0 ? 'block' : 'none';
            }
        }

        function showSaveModal() {
            const modal = document.getElementById('saveModal');
            const preview = document.getElementById('changesPreview');
            
            let html = '<h3>Changes to save:</h3><ul>';
            pendingChanges.forEach(c => {
                const action = c.type === 'create' ? 'Created' : c.type === 'update' ? 'Updated' : c.type === 'move' ? 'Moved' : 'Deleted';
                html += `<li><strong>${action}:</strong> #${c.data.id} - ${c.data.title || c.data.id}</li>`;
            });
            html += '</ul>';
            
            const exportData = {
                lastUpdated: new Date().toISOString(),
                changes: pendingChanges,
                tasks: tasks
            };
            
            document.getElementById('jsonExport').textContent = JSON.stringify(exportData, null, 2);
            preview.innerHTML = html;
            modal.style.display = 'flex';
        }

        function closeSaveModal() {
            document.getElementById('saveModal').style.display = 'none';
        }

        function copyJSON() {
            const json = document.getElementById('jsonExport').textContent;
            navigator.clipboard.writeText(json).then(() => {
                alert('JSON copied to clipboard! Send it to me to save changes.');
            });
        }

        function clearPendingChanges() {
            pendingChanges = [];
            localStorage.removeItem('pendingChanges');
            updatePendingChangesUI();
            closeSaveModal();
            loadTasks();
        }

        function changeWeek(delta) {
            currentWeekOffset += delta;
            renderCalendar();
        }

        /**
         * Show error message
         */
        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        /**
         * Get tasks for a specific date
         */
        function getTasksForDate(date) {
            const dateStr = getDateString(date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = getDateString(today);

            return tasks.filter(task => {
                // Completed tasks - show on their original due date
                if (task.status === 'done') {
                    return task.due === dateStr;
                }
                
                // Tasks without due date go to today
                if (task.due === null || task.due === undefined) {
                    return dateStr === todayStr;
                }
                
                // Check if task is overdue (due date is before today)
                const taskDueDate = new Date(task.due);
                taskDueDate.setHours(0, 0, 0, 0);
                const isOverdue = taskDueDate < today;
                
                // If overdue, show on TODAY (rolling behavior)
                if (isOverdue) {
                    return dateStr === todayStr;
                }
                
                // Regular task - check if due date matches
                return task.due === dateStr;
            });
        }

        /**
         * Sort tasks by priority
         */
        function sortTasks(taskList) {
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            return taskList.sort((a, b) => {
                return (priorityOrder[a.priority] || 3) - (priorityOrder[b.priority] || 3);
            });
        }

        /**
         * Create a task card HTML
         */
        function createTaskCard(task) {
            const dueDate = task.due ? new Date(task.due) : null;
            const isOverdue = dueDate && isPast(dueDate) && !isToday(dueDate);
            
            let html = `<div class="task-card priority-${task.priority}${isOverdue ? ' overdue' : ''}">`;
            html += `<div class="task-id">#${task.id}</div>`;
            html += `<div class="task-title">${escapeHtml(task.title)}</div>`;
            html += `<div class="task-meta">`;
            html += `<span class="task-priority ${task.priority}">${task.priority}</span>`;
            
            if (isOverdue) {
                html += `<span class="task-due overdue">OVERDUE</span>`;
            } else if (dueDate) {
                html += `<span class="task-due">${dueDate.toLocaleDateString('it-IT', { month: 'short', day: 'numeric' })}</span>`;
            }
            
            html += `</div></div>`;
            return html;
        }

        /**
         * Escape HTML special characters
         */
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        /**
         * Get day name
         */
        function getDayName(date) {
            return date.toLocaleDateString('it-IT', { weekday: 'short' }).toUpperCase();
        }

        /**
         * Render the calendar
         */
        function renderCalendar() {
            const today = new Date();
            const weekStart = getCurrentWeekStart();
            const weekDays = getWeekDays(weekStart);

            // Update header
            document.getElementById('weekStart').textContent = weekStart.toLocaleDateString('it-IT', { month: 'short', day: 'numeric' });
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            document.getElementById('weekEnd').textContent = weekEnd.toLocaleDateString('it-IT', { month: 'short', day: 'numeric' });
            document.getElementById('todayDisplay').textContent = formatDate(today);

            // Render calendar
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            weekDays.forEach(day => {
                const dayTasks = sortTasks(getTasksForDate(day));
                const isTodayFlag = isToday(day);

                let html = `<div class="day-column${isTodayFlag ? ' today' : ''}">`;
                html += `<div class="day-header${isTodayFlag ? ' today' : ''}">`;
                html += `<div class="day-name">${getDayName(day)}</div>`;
                html += `<div class="day-date${isTodayFlag ? ' today' : ''}">${day.getDate()}</div>`;
                html += `</div>`;
                html += `<div class="tasks-container">`;

                if (dayTasks.length === 0) {
                    html += `<div class="no-tasks">No tasks</div>`;
                } else {
                    dayTasks.forEach(task => {
                        html += createTaskCard(task);
                    });
                }

                html += `</div></div>`;

                const div = document.createElement('div');
                div.innerHTML = html;
                calendar.appendChild(div.firstElementChild);
            });
        }

        /**
         * Update the last sync time display
         */
        function updateLastSyncTime() {
            const now = new Date();
            const seconds = Math.floor((now - lastSyncTime) / 1000);
            
            let timeText = 'just now';
            if (seconds >= 60) {
                timeText = `${Math.floor(seconds / 60)}m ago`;
            } else if (seconds > 0) {
                timeText = `${seconds}s ago`;
            }
            
            document.getElementById('syncTime').textContent = timeText;
            lastSyncTime = now;
        }

        /**
         * Initialize the app
         */
        async function init() {
            await loadTasks();
            renderCalendar();

            // Set up periodic sync
            setInterval(async () => {
                await loadTasks();
                renderCalendar();
            }, CONFIG.syncInterval);

            // Update time display
            setInterval(updateLastSyncTime, 5000);
        }

        // Modal Functions
        function showCreateModal() {
            document.getElementById('createModal').style.display = 'flex';
            document.getElementById('newTaskDate').value = getDateString(new Date());
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
            document.getElementById('createForm').reset();
        }

        function handleCreateSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('newTaskTitle').value;
            const date = document.getElementById('newTaskDate').value || getDateString(new Date());
            const priority = document.getElementById('newTaskPriority').value;
            const notes = document.getElementById('newTaskNotes').value;

            const newTask = {
                id: 'new-' + Date.now(),
                title: title,
                due: date,
                priority: priority,
                status: 'todo',
                assignee: 'FHG',
                notes: notes
            };

            addPendingChange('create', newTask);
            closeCreateModal();
        }

        let currentEditTask = null;

        function showEditModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            currentEditTask = task;
            document.getElementById('editTaskId').textContent = '#' + task.id;
            document.getElementById('editTaskIdHidden').value = task.id;
            document.getElementById('editTaskTitle').value = task.title;
            document.getElementById('editTaskDate').value = task.due || '';
            document.getElementById('editTaskPriority').value = task.priority || 'medium';
            document.getElementById('editTaskNotes').value = task.notes || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditTask = null;
        }

        function handleEditSubmit(e) {
            e.preventDefault();
            if (!currentEditTask) return;

            const updatedTask = {
                id: currentEditTask.id,
                title: document.getElementById('editTaskTitle').value,
                due: document.getElementById('editTaskDate').value || null,
                priority: document.getElementById('editTaskPriority').value,
                notes: document.getElementById('editTaskNotes').value
            };

            addPendingChange('update', updatedTask);
            closeEditModal();
        }

        function deleteCurrentTask() {
            if (!currentEditTask) return;
            if (confirm('Are you sure you want to delete this task?')) {
                addPendingChange('delete', { id: currentEditTask.id });
                closeEditModal();
            }
        }

        // Make task cards clickable
        document.addEventListener('click', function(e) {
            const taskCard = e.target.closest('.task-card');
            if (taskCard) {
                const taskId = taskCard.querySelector('.task-id').textContent.replace('#', '');
                showEditModal(taskId);
            }
        });

        // Start the app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
